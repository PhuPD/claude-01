name: Daily Weather Hà Đông

on:
  schedule:
    - cron: '0 0 * * *'  # 7:00 sáng giờ Việt Nam (UTC+7 = 00:00 UTC)
  workflow_dispatch:      # cho phép chạy thủ công để test

jobs:
  weather:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests pytz beautifulsoup4

      - name: Fetch and report weather
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/weather_ha_dong.py
